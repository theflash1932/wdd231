<!doctype html>
<html lang="en-US">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

        content="Decathlon calculator webpage, calculate your decathlon event scores based on your event performance">

    <meta property="og:title" content="Greg Nielson Decathlon Multi-events Calculator">
    <meta property="og:description"
        content="Decathlon calculator webpage, calculate your decathlon event scores based on your event performance">
    <meta property="og:url" content="https://theflash1932.github.io/wdd231/final/index.html">
    <meta property="og:image" content="https://theflash1932.github.io/wdd231/final/images/deca.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">
    <link href="styles/decathlon.css" rel="stylesheet">
    <link rel="icon" href="favicon.ico">
    <script src="scripts/getdates-lists.js" defer></script>
    <title>Greg Nielson &dash; Decathlon Records - WDD231 Final Project</title>
</head>

<body>
    <header>
        <div class="title-header">
            <img src="images/deca.png" alt="decathlon">
        </div>
        <a id="menu" href="#"></a>
        <nav>
            <ul class="navigation">
                <li><a href="./" id="showAll">Home</a></li>
                <li><a href="about.html" id="aboutDeca">About</a></li>
                <li><a href="records.html" id="records" class="active">Records</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>About the Decathlon</h1>
        <section class="recordMain">
            <h2>World Record</h2>
            <h3>Kevin Mayer, France 2018<br><br>9126 POINTS</h3>
            <span id="record"></span>
        </section>
        <section class="recordMain">
            <h2>USA Record</h2>
            <h3>Ashton Eaton, USA 2012<br><br>9045 POINTS</h3>
            <span id="recordUSA"></span>
        </section>
    </main>
    <footer>
        <p>
            @<span id="currentyear"></span> Greg Nielson Utah, USA
        </p>
        <p id="lastmodified"></p>
        <p class="visits">
            <script id="rendered-js">
                const visitDisplay = document.querySelector('.visits')
                let numVisits = Number(window.localStorage.getItem("visits-rec"))
                if (numVisits !== 0) {
                    visitDisplay.innerHTML = `<br>You have visited this page ${numVisits} times.`
                } else {
                    visitDisplay.innerHTML = `<br>First visit, have fun!`
                }

                numVisits++

                localStorage.setItem("visits-rec", numVisits)
            </script>
        </p>
    </footer>
</body>

</html>
